<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configure Stremio Stinger Pro</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; text-align: center; background: #121212; color: #fff; }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0 20px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #8a5aE9; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin: 5px; font-weight: bold; }
        button:hover { background: #7141cc; }
        .optional-text { font-size: 12px; color: #aaa; display: block; margin-bottom: 10px; text-align: left; }
        #result-container { margin-top: 30px; display: none; background: #1e1e1e; padding: 15px; border-radius: 5px; text-align: left; border: 1px solid #333; }
        .code-box { background: #000; padding: 10px; border-radius: 5px; word-break: break-all; font-family: monospace; color: #00ff88; margin-bottom: 15px; border: 1px solid #444;}
        .copy-btn { background: #444; width: 100%; }
        .copy-btn:hover { background: #555; }
    </style>
</head>
<body>
    <h1>Stremio Stinger Pro</h1>
    <p>Configure your post-credits experience.</p>
    
    <div style="text-align: left;">
        <label for="apiKey">Enter your TMDB API Key (Optional)</label>
    </div>
    <input type="text" id="apiKey" placeholder="Enter key or leave blank">
    <span class="optional-text">If left blank, the addon will rely exclusively on AfterCredits.com.</span>
    
    <button onclick="installAddon()">1. Install in Stremio</button>

    <!-- Fallback Container -->
    <div id="result-container">
        <p style="margin-top:0; font-size: 14px; color: #ffcc00;">If Stremio didn't open automatically, copy the link below and paste it into the Stremio Addon search bar:</p>
        <div class="code-box" id="install-link"></div>
        <button class="copy-btn" onclick="copyLink()">2. Copy Link</button>
    </div>

    <script>
        let currentHttpsUrl = '';

        function installAddon() {
            const key = document.getElementById('apiKey').value.trim();
            const host = window.location.host;
            
            // Determine if running locally or on Render
            const isLocal = host.includes('localhost') || host.includes('127.0.0.1');
            const httpProtocol = isLocal ? 'http://' : 'https://';
            
            // Construct the path based on whether an API key was provided
            const path = key ? `/${encodeURIComponent(key)}/manifest.json` : `/manifest.json`;
            
            // Generate both URL formats
            const stremioUrl = `stremio://${host}${path}`;
            currentHttpsUrl = `${httpProtocol}${host}${path}`;
            
            // Expose the fallback UI
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('install-link').innerText = currentHttpsUrl;
            
            // Attempt to trigger the deep link
            window.location.href = stremioUrl;
        }

        function copyLink() {
            navigator.clipboard.writeText(currentHttpsUrl).then(() => {
                alert('Manifest link copied! Paste this directly into the Stremio Addon search bar.');
            }).catch(err => {
                alert('Failed to copy to clipboard. Please select the text and copy it manually.');
            });
        }
    </script>
</body>
</html>
